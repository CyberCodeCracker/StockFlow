services:
  postgres:
    container_name: postgres-sql-sf
    image: postgres:13
    environment:
      POSTGRES_USER: post
      POSTGRES_PASSWORD: post
      POSTGRES_DB: stock_flow
      PGDATA: /var/lib/postgresql/data
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - 5432:5432
    networks:
      - stock_flow
    restart: unless-stopped

  mail-dev:
    container_name: mail-dev-sf
    image: maildev/maildev:latest
    ports:
      - 1025:1025
      - 1080:1080

networks:
  stock_flow:
    driver: bridge

volumes:
  postgres_data:
    driver: local


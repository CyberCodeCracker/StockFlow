spring.application.name=stockflow

spring.datasource.url=jdbc:postgresql://localhost:5432/stock_flow
spring.datasource.username=post
spring.datasource.password=post

# We manage the Postgres container manually (docker compose up), so don't let Spring
# start/stop it. Re-enable by removing this if you want Boot to manage the lifecycle.
spring.docker.compose.enabled=false

# JPA / Hibernate — schema is owned by Flyway, so only validate at startup
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true

# JWT — override the secret via env var in real environments (must be >= 32 bytes for HS256)
security.jwt.secret=${JWT_SECRET:change-me-to-a-long-random-secret-at-least-32-bytes-please}
security.jwt.access-expiration-ms=900000
security.jwt.refresh-expiration-ms=604800000

# Bootstrap admin — override via ADMIN_EMAIL / ADMIN_PASSWORD env vars outside dev
stockflow.admin.email=${ADMIN_EMAIL:admin@stockflow.local}
stockflow.admin.password=${ADMIN_PASSWORD:admin12345}
